<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Aaryan Anuj Enterprises</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50 0%, #3d5a80 100%);
            padding: 2rem;
        }
        
        .thank-you-card {
            background: white;
            padding: 4rem 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .thank-you-icon {
            width: 100px;
            height: 100px;
            background: #c9a961;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease;
        }
        
        .thank-you-icon i {
            font-size: 3rem;
            color: white;
        }
        
        .thank-you-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        .thank-you-card p {
            color: #6c757d;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .thank-you-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #c9a961;
            color: white;
        }
        
        .btn-primary:hover {
            background: #8b7355;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #2c3e50;
            border: 2px solid #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #2c3e50;
            color: white;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        @media (max-width: 768px) {
            .thank-you-card {
                padding: 3rem 2rem;
            }
            
            .thank-you-card h1 {
                font-size: 2rem;
            }
            
            .thank-you-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <section class="thank-you-section">
        <div class="thank-you-card">
            <div class="thank-you-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>Thank You!</h1>
            <p>Your message has been successfully sent to Aaryan Anuj Enterprises. Our team will review your inquiry and get back to you within 24 hours.</p>
            <p>We appreciate your interest in our properties and look forward to helping you find your dream space.</p>
            <div class="thank-you-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="index.html#projects" class="btn btn-secondary">
                    <i class="fas fa-building"></i> View Projects
                </a>
            </div>
        </div>
    </section>
</body>
</html>
